<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Socio - Aquiles Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body style="background-color: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px;">

    <div style="background-color: #141414; padding: 40px; border-radius: 20px; border: 1px solid #222; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: #98cf2c; margin: 0; text-transform: uppercase; font-weight: 900; letter-spacing: -0.5px; font-size: 24px;">Editar Perfil</h2>
            <p style="color: #888; font-size: 13px; margin-top: 8px; font-weight: 600; letter-spacing: 1px;">
                SOCIO ID: <span style="color: #fff;">{{ alumno.codigo }}</span>
            </p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #98cf2c; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Nombre</label>
                <input type="text" name="nombre" value="{{ alumno.user.first_name }}" required
                       style="width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; font-size: 15px; outline: none; transition: border-color 0.3s;"
                       onfocus="this.style.borderColor='#98cf2c'">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; color: #98cf2c; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Apellido</label>
                <input type="text" name="apellido" value="{{ alumno.user.last_name }}" required
                       style="width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; font-size: 15px; outline: none; transition: border-color 0.3s;"
                       onfocus="this.style.borderColor='#98cf2c'">
            </div>

            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; color: #98cf2c; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Plan Semanal</label>
                <select name="plan" style="width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; font-size: 15px; cursor: pointer; appearance: none; outline: none;">
                    {% for i in "123456" %}
                        <option value="{{ i }}" {% if alumno.plan_semanal|slugify == i %}selected{% endif %}>
                            {{ i }} día{% if i != "1" %}s{% endif %} por semana
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" style="width: 100%; background-color: #98cf2c; color: #000; padding: 16px; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.2s, background-color 0.2s;"
                    onmouseover="this.style.backgroundColor='#a8e03a'"
                    onmouseout="this.style.backgroundColor='#98cf2c'"
                    onmousedown="this.style.transform='scale(0.98)'"
                    onmouseup="this.style.transform='scale(1)'">
                Guardar Cambios
            </button>

            <a href="{% url 'gestion_gym' %}" style="display: block; text-align: center; margin-top: 25px; color: #555; text-decoration: none; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: color 0.2s;"
               onmouseover="this.style.color='#888'"
               onmouseout="this.style.color='#555'">
                ← Cancelar y volver
            </a>
        </form>
    </div>

</body>
</html>
