<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recepción - Aquiles Gym</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 550px;
        }

        /* AJUSTE DEL LOGO: Ahora más grande y protagonista */
        .logo-principal {
            width: 100%; 
            max-width: 480px; /* Tamaño ideal para que destaque */
            height: auto;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            /* Resplandor neón sutil */
            filter: drop-shadow(0 0 15px rgba(163, 255, 0, 0.3));
        }

        .recepcion-text {
            display: block;
            font-size: 0.9rem;
            color: #444; 
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 35px;
            font-weight: bold;
        }

        /* CAMPO ID SOCIO */
        .id-input {
            width: 100%;
            background-color: #0a0a0a;
            border: 2px solid #1a1a1a;
            border-radius: 12px;
            padding: 22px;
            font-size: 1.6rem;
            color: #fff;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .id-input:focus {
            border-color: #a3ff00;
            box-shadow: 0 0 20px rgba(163, 255, 0, 0.1);
            background-color: #111;
        }

        .id-input::placeholder {
            color: #222;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="../static/img/logo_aquiles.png" alt="Aquiles Gym Logo" class="logo-principal">
        
        <span class="recepcion-text">RECEPCIÓN</span>

        <input type="text" class="id-input" placeholder="ID SOCIO" autofocus>
    </div>

</body>
</html>
