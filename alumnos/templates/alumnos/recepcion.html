{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción - Aquiles Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-aquiles: #98cf2c;
            --rojo-error: #ff4d4d;
            --amarillo-alerta: #ffc107;
            --negro-fondo: #000000;
        }

        body { 
            background-color: var(--negro-fondo); 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            text-align: center; 
            padding-top: 8vh; 
            margin: 0;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-gym {
            font-size: 80px;
            font-weight: 900;
            color: var(--verde-aquiles);
            letter-spacing: -3px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitulo {
            font-size: 20px;
            color: #444;
            letter-spacing: 10px;
            margin-bottom: 50px;
            font-weight: 400;
            text-transform: uppercase;
        }

        /* INPUT DE CÓDIGO GIGANTE */
        .form-recepcion { margin-bottom: 40px; }
        
        .input-codigo { 
            background: #0a0a0a; 
            color: var(--verde-aquiles); 
            border: 4px solid #1a1a1a; 
            padding: 30px; 
            font-size: 60px; 
            text-align: center; 
            width: 500px; 
            border-radius: 25px; 
            outline: none; 
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .input-codigo:focus {
            border-color: var(--verde-aquiles);
            background: #111;
            box-shadow: 0 0 30px rgba(152, 207, 44, 0.2);
        }

        /* ALERTAS DE PANTALLA COMPLETA O BOX GRANDE */
        .alerta-contenedor {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 50px;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .mensaje-alerta { 
            padding: 40px; 
            border-radius: 30px; 
            display: inline-block; 
            min-width: 700px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* ESTADOS */
        .success { background-color: var(--verde-aquiles); color: #000; font-size: 45px; }
        .danger { background-color: var(--rojo-error); color: #fff; font-size: 40px; }
        .warning { background-color: var(--amarillo-alerta); color: #000; font-size: 40px; }

        .instruccion {
            position: fixed;
            bottom: 30px;
            color: #333;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="logo-gym">AQUILES</div>
    <div class="subtitulo">RECEPCIÓN</div>

    <form method="POST" class="form-recepcion" id="form_recepcion">
        {% csrf_token %}
        <input type="text" name="codigo" id="codigo_input" 
               class="input-codigo" placeholder="ID SOCIO" 
               autocomplete="off" autofocus>
    </form>

    {% if mensaje %}
    <div class="alerta-contenedor">
        <div class="mensaje-alerta {{ clase_alerta }}">
            {{ mensaje }}
        </div>
    </div>
    {% endif %}

    <div class="instruccion">Esperando lectura de código...</div>

    <script>
        const input = document.getElementById('codigo_input');

        // Mantiene el foco pase lo que pase
        input.focus();
        document.addEventListener('click', () => input.focus());
        
        // Bloquea el pegado para forzar escritura/escaneo
        input.onpaste = e => e.preventDefault();

        // Si hay un mensaje, lo mostramos y reiniciamos después de 3.5 segundos
        {% if mensaje %}
        setTimeout(() => {
            window.location.href = "{% url 'recepcion' %}";
        }, 3500);
        {% endif %}

        // Si el usuario escribe y presiona Enter, el formulario se envía solo (por defecto)
    </script>
</body>
</html>
