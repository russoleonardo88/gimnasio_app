{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción - Aquiles Gym</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-aquiles: #98cf2c;
            --rojo-error: #ff4d4d;
            --amarillo-alerta: #ffc107;
            --negro-fondo: #000000;
            --negro-card: #0a0a0a;
            --gris-borde: #1a1a1a;
        }

        body { 
            background-color: var(--negro-fondo); 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* DISEÑO DEL LOGO NUEVO */
        .contenedor-logo {
            text-align: center;
            margin-bottom: 50px;
        }

        .casco-vikingo {
            width: 120px; /* Ajusta según el tamaño de tu archivo de imagen */
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(152, 207, 44, 0.2));
        }

        .brand-name {
            font-size: 55px;
            font-weight: 900;
            color: var(--verde-aquiles);
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 0.9;
            margin: 0;
        }

        .brand-sub {
            font-size: 16px;
            font-weight: 700;
            color: var(--verde-aquiles);
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-top: 5px;
            border-top: 2px solid var(--verde-aquiles);
            border-bottom: 2px solid var(--verde-aquiles);
            display: inline-block;
            padding: 2px 10px;
        }

        .recepcion-tag {
            font-size: 12px;
            color: #444;
            letter-spacing: 8px;
            margin-top: 30px;
            font-weight: 400;
            text-transform: uppercase;
        }

        /* INPUT DE ID SOCIO */
        .form-recepcion { width: 100%; max-width: 500px; padding: 0 20px; box-sizing: border-box; }
        
        .input-codigo { 
            background: var(--negro-card); 
            color: #ffffff; 
            border: 2px solid var(--gris-borde); 
            padding: 25px; 
            font-size: 40px; 
            text-align: center; 
            width: 100%; 
            border-radius: 20px; 
            outline: none; 
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            box-sizing: border-box;
        }
        
        .input-codigo:focus {
            border-color: var(--verde-aquiles);
            box-shadow: 0 0 30px rgba(152, 207, 44, 0.1);
        }

        .input-codigo::placeholder {
            color: #333;
            letter-spacing: 2px;
        }

        /* ALERTAS GRANDES */
        .alerta-contenedor {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            animation: fadeIn 0.3s ease;
        }

        .mensaje-alerta { 
            padding: 60px; 
            border-radius: 40px; 
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            min-width: 60%
        }

        .success { background-color: var(--verde-aquiles); color: #000; font-size: 50px; }
        .danger { background-color: var(--rojo-error); color: #fff; font-size: 45px; }
        .warning { background-color: var(--amarillo-alerta); color: #000; font-size: 45px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .instruccion {
            position: fixed;
            bottom: 30px;
            color: #222;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="contenedor-logo">
        <img src="{% static 'img/logo_aquiles_solo_casco.png' %}" class="casco-vikingo" alt="Logo">
        <h1 class="brand-name">AQUILES</h1>
        <div class="brand-sub">GYM CISAR</div>
        <div class="recepcion-tag">RECEPCIÓN</div>
    </div>

    <form method="POST" class="form-recepcion" id="form_recepcion">
        {% csrf_token %}
        <input type="text" name="codigo" id="codigo_input" 
               class="input-codigo" placeholder="ID SOCIO" 
               autocomplete="off" autofocus>
    </form>

    {% if mensaje %}
    <div class="alerta-contenedor">
        <div class="mensaje-alerta {{ clase_alerta }}">
            {{ mensaje }}
        </div>
    </div>
    {% endif %}

    <div class="instruccion">Esperando lectura de código...</div>

    <script>
        const input = document.getElementById('codigo_input');
        input.focus();
        document.addEventListener('click', () => input.focus());
        input.onpaste = e => e.preventDefault();

        {% if mensaje %}
        setTimeout(() => {
            window.location.href = "{% url 'recepcion' %}";
        }, 3500);
        {% endif %}
    </script>
</body>
</html>
