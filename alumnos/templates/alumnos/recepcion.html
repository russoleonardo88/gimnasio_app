<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción - Aquiles Gym</title>
    <style>
        /* Fondo y Centrado Principal */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
        }

        /* El Logo: Aquí es donde ajustamos el tamaño */
        .logo-principal {
            width: 100%; /* Ocupa el ancho del contenedor */
            max-width: 500px; /* Tamaño máximo para que no se pixele */
            height: auto;
            margin-bottom: 40px;
            /* Efecto de brillo suave para que resalte sobre el negro */
            filter: drop-shadow(0 0 15px rgba(163, 255, 0, 0.2));
        }

        /* Etiqueta Recepción */
        .recepcion-label {
            display: block;
            font-size: 1.1rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            font-weight: 300;
        }

        /* Input de ID SOCIO */
        .id-input {
            width: 100%;
            background-color: #111;
            border: 2px solid #222;
            border-radius: 15px;
            padding: 25px;
            font-size: 1.8rem;
            color: #fff;
            text-align: center;
            text-transform: uppercase;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
            font-weight: bold;
        }

        .id-input:focus {
            border-color: #a3ff00;
            box-shadow: 0 0 20px rgba(163, 255, 0, 0.15);
            background-color: #151515;
        }

        /* Placeholder oscuro para que no distraiga */
        .id-input::placeholder {
            color: #333;
        }

        /* Ajustes para pantallas chicas */
        @media (max-width: 480px) {
            .logo-principal { max-width: 300px; }
            .id-input { padding: 18px; font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="img/logo_aquiles.png" alt="Aquiles Gym" class="logo-principal">
        
        <span class="recepcion-label">Recepción</span>

        <input type="text" class="id-input" placeholder="ID SOCIO" autofocus>
    </div>

</body>
</html>
