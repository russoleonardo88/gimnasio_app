{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquiles App - Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro-puro: #000000;
            --negro-card: #0a0a0a;
            --verde-neon: #98cf2c;
            --blanco: #ffffff;
            --gris-borde: #222222;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--negro-puro);
            color: var(--blanco);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .perfil-container {
            width: 100%;
            max-width: 360px;
            padding: 25px;
            background: var(--negro-card);
            border: 1px solid var(--gris-borde);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--verde-neon);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 1px solid var(--gris-borde);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--verde-neon);
        }

        .helptext {
            display: block;
            font-size: 10px;
            color: #555;
            margin-top: 5px;
            line-height: 1.4;
        }

        .btn-update {
            width: 100%;
            padding: 15px;
            background: var(--verde-neon);
            border: none;
            border-radius: 12px;
            color: black;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .btn-update:active { transform: scale(0.96); }

        .btn-cancel {
            display: block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
        }
        
        /* Estilo para los errores de Django */
        .errorlist {
            color: #ff4444;
            list-style: none;
            padding: 0;
            font-size: 12px;
            margin-bottom: 15px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="perfil-container">
        <h2>Seguridad</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <span class="helptext">{{ field.help_text|safe }}</span>
                    {% endif %}
                    {{ field.errors }}
                </div>
            {% endfor %}

            <button type="submit" class="btn-update">Guardar Nueva Clave</button>
        </form>

        <a href="{% url 'dashboard' %}" class="btn-cancel">Volver sin cambios</a>
</body>
</html>
