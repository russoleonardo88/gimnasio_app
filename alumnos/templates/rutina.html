{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Rutina</title>
    <style>
        body { background: #f0f0f0; font-family: 'Segoe UI', Arial, sans-serif; color: #333; margin: 0; }
        
        /* Barra superior roja */
        .topbar { background: #e53935; padding: 20px; text-align: center; color: white; }
        .nombre { font-size: 20px; font-weight: bold; margin-bottom: 15px; }
        
        /* Navegación días */
        .dias { display: flex; justify-content: center; gap: 8px; }
        .dias a { background: white; color: #333; text-decoration: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .dias a.activo { background: #b71c1c; color: white; }

        /* Contenedor principal */
        .rutina { padding: 15px; }
        h2 { color: #e53935; font-size: 18px; margin-top: 20px; }

        /* Tarjetas de ejercicio */
        .card { 
            background: white; 
            border-radius: 12px; 
            padding: 16px; 
            margin-bottom: 12px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .card.hecho { border-left: 5px solid #e53935; opacity: 0.7; }
        
        .info-ejercicio { flex-grow: 1; }
        .ejercicio-nombre { font-weight: bold; font-size: 16px; display: block; }
        .detalle { color: #666; font-size: 13px; margin-top: 2px; }

        /* Botón estilo Material */
        .btn-check { 
            width: 30px; height: 30px; border-radius: 50%; 
            border: 2px solid #e53935; background: transparent; cursor: pointer;
        }
        .card.hecho .btn-check { background: #e53935; }

        .logout { 
            display: block; width: 90%; margin: 20px auto; 
            background: #e53935; color: white; border: none; 
            padding: 12px; border-radius: 8px; font-weight: bold; 
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div class="nombre">Rutina de hoy: {{ dia }}</div>
        <div class="dias">
            <a href="/mi-rutina/?dia=Lunes" class="{% if dia == 'Lunes' %}activo{% endif %}">L</a>
            <a href="/mi-rutina/?dia=Martes" class="{% if dia == 'Martes' %}activo{% endif %}">M</a>
            <a href="/mi-rutina/?dia=Miércoles" class="{% if dia == 'Miércoles' %}activo{% endif %}">X</a>
            <a href="/mi-rutina/?dia=Jueves" class="{% if dia == 'Jueves' %}activo{% endif %}">J</a>
            <a href="/mi-rutina/?dia=Viernes" class="{% if dia == 'Viernes' %}activo{% endif %}">V</a>
        </div>
    </div>

    <div class="rutina">
        {% for rutina in rutinas %}
        <h2>{{ rutina.nombre }}</h2>
        {% for ejercicio in rutina.ejercicio_set.all %}
        <div class="card" id="card-{{ ejercicio.id }}">
            <div class="info-ejercicio">
                <span class="ejercicio-nombre">{{ ejercicio.nombre }}</span>
                <div class="detalle">{{ ejercicio.series }} series - {{ ejercicio.repeticiones }} reps</div>
            </div>
            <button class="btn-check" onclick="toggleEjercicio('{{ ejercicio.id }}')"></button>
        </div>
        {% endfor %}
        {% endfor %}
    </div>

    <form action="/login/" method="get">
        <button class="logout">Cerrar sesión</button>
    </form>

    <script>
        function toggleEjercicio(id) {
            const card = document.getElementById('card-' + id);
            const isDone = card.classList.toggle('hecho');
            localStorage.setItem("ejercicio_" + id, isDone);
        }

        // Cargar estado al iniciar
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll('.card').forEach(card => {
                const id = card.id.replace('card-', '');
                if (localStorage.getItem("ejercicio_" + id) === "true") {
                    card.classList.add('hecho');
                }
            });
        });
    </script>
</body>
</html>
