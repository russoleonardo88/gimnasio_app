{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Rutina</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #141414;
            --accent: #00ff88;
            --text: #ffffff;
            --muted: #888;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            margin: 0;
            padding-bottom: 100px;
        }

        .topbar {
            background: linear-gradient(180deg, #111 0%, #0a0a0a 100%);
            padding: 25px 20px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .nombre { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 15px; }

        .dias { display: flex; justify-content: space-between; gap: 8px; margin: 0 20px; }
        .dias a {
            flex: 1;
            background: #1a1a1a;
            color: var(--muted);
            text-decoration: none;
            padding: 12px 0;
            border-radius: 12px;
            font-weight: 600;
            transition: 0.3s;
        }
        .dias a.activo { background: var(--accent); color: black; }

        .progreso-container { padding: 25px 20px; }
        .barra { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-top: 10px; }
        #barra-progreso { height: 100%; width: 0%; background: var(--accent); box-shadow: 0 0 10px var(--accent); transition: 0.5s ease; }

        .rutina { padding: 20px; }
        h2 { font-size: 18px; margin: 30px 0 15px; display: flex; align-items: center; gap: 10px; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 12px;
            border: 1px solid #222;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:active { transform: scale(0.97); }
        .card.hecho { border-color: var(--accent); background: #1a1a1a; }
        
        .check { display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .check input { width: 22px; height: 22px; accent-color: var(--accent); }
        
        .detalle { color: var(--muted); font-size: 14px; margin-top: 8px; padding-left: 37px; }

        .logout {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: #1a1a1a; border: 1px solid #333;
            padding: 15px; border-radius: 15px; color: #ff4444;
            font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="nombre">Rutina: {{ dia }}</div>
    <div class="dias">
        <a href="?dia=Lunes" class="{% if dia == 'Lunes' %}activo{% endif %}">L</a>
        <a href="?dia=Martes" class="{% if dia == 'Martes' %}activo{% endif %}">M</a>
        <a href="?dia=Miércoles" class="{% if dia == 'Miércoles' %}activo{% endif %}">X</a>
        <a href="?dia=Jueves" class="{% if dia == 'Jueves' %}activo{% endif %}">J</a>
        <a href="?dia=Viernes" class="{% if dia == 'Viernes' %}activo{% endif %}">V</a>
    </div>
</div>

<div class="progreso-container">
    <div>Progreso <span id="porcentaje">0%</span></div>
    <div class="barra"><div id="barra-progreso"></div></div>
</div>

<div class="rutina">
    {% if ejercicios_normal %}
    <h2>🏋️ Fuerza</h2>
    {% for ejercicio in ejercicios_normal %}
    <div class="card" id="card-{{ejercicio.id}}">
        <label class="check">
            <input type="checkbox" data-id="{{ ejercicio.id }}">
            <span style="font-weight:600">{{ ejercicio.nombre }}</span>
        </label>
        <div class="detalle">{{ ejercicio.series }} series × {{ ejercicio.repeticiones }} reps</div>
    </div>
    {% endfor %}
    {% endif %}

    </div>

<form action="/login/" method="get"><button class="logout">Cerrar sesión</button></form>

<script>
    // Tu lógica de JS permanece igual pero ahora afectará a estas nuevas clases
    document.querySelectorAll("input[type='checkbox']").forEach(c => {
        c.addEventListener("change", function() {
            const card = this.closest(".card");
            if(this.checked) card.classList.add("hecho");
            else card.classList.remove("hecho");
            // ... (tu lógica de porcentaje y localStorage aquí)
        });
    });
</script>

</body>
</html>
