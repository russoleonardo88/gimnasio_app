<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aquiles Gym</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #FFFFFF;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #000000;
        }

        .login-container {
            width: 85%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 40px;
            font-weight: 700;
        }

        input {
            width: 100%;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid #E0E0E0;
            border-radius: 15px;
            font-size: 16px;
            box-sizing: border-box;
            background-color: #FAFAFA;
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: #FF5C5C;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Regístrate</h1>
        
        <form method="post">
            {% csrf_token %}
            
            <input type="text" name="username" placeholder="Usuario" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            
            <button type="submit">Conectarse</button>
        </form>
    </div>

</body>
</html>
