{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aquiles App - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro-puro: #000000;
            --negro-card: #0a0a0a;
            --verde-aquiles: #98cf2c;
            --gris-borde: #1a1a1a;
            --gris-texto: #888888;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--negro-puro);
            color: var(--blanco);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            background-color: var(--negro-puro);
            padding: 40px 20px 25px 20px;
            text-align: center;
            border-bottom: 2px solid var(--verde-aquiles);
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 5px rgba(152, 207, 44, 0.2));
        }

        .header h1 {
            font-family: 'Oswald', sans-serif;
            margin: 0;
            font-size: 1.6rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--blanco);
        }

        .container {
            padding: 25px 20px;
            flex-grow: 1;
        }

        .dia-card {
            background: var(--negro-card);
            border: 1px solid var(--gris-borde);
            border-radius: 15px;
            padding: 22px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--blanco);
            transition: all 0.2s ease;
        }

        .dia-card:active {
            transform: scale(0.97);
            border-color: var(--verde-aquiles);
            background-color: #0f0f0f;
        }

        .dia-info {
            flex-grow: 1;
        }

        .dia-info h2 {
            font-family: 'Oswald', sans-serif;
            margin: 0 0 12px 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-container {
            width: 85%;
            background-color: #1a1a1a;
            border-radius: 10px;
            height: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--verde-aquiles);
            box-shadow: 0 0 15px rgba(152, 207, 44, 0.4);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .porcentaje-texto {
            font-family: 'Oswald', sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            margin-left: 15px;
            color: var(--verde-aquiles);
        }

        .footer {
            padding: 40px 20px;
            text-align: center;
        }

        .btn-logout {
            color: var(--gris-texto);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            border-bottom: 1px solid transparent;
            transition: border 0.3s;
        }

        .btn-logout:hover {
            border-bottom: 1px solid var(--verde-aquiles);
            color: var(--blanco);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-container">
            <img src="{% static 'img/logo_aquiles.jpg' %}" alt="Aquiles Logo">
        </div>
        <h1>AQUILES APP</h1>
    </div>

    <div class="container">
        {% for dia in progreso_dias %}
        <a href="{% url 'mi_rutina' %}?dia={{ dia.nombre }}" class="dia-card">
            <div class="dia-info">
                <h2>{{ dia.nombre }}</h2>
                <div class="progress-container">
                    <div class="progress-bar" style="width: {{ dia.porcentaje }}%;"></div>
                </div>
            </div>
            <div class="porcentaje-texto">{{ dia.porcentaje }}%</div>
        </a>
        {% empty %}
        <p style="text-align: center; color: var(--gris-texto);">No hay datos disponibles.</p>
        {% endfor %}
    </div>

    <div class="footer">
        <a href="{% url 'logout' %}" class="btn-logout">Finalizar Sesión</a>
    </div>

</body>
</html>
